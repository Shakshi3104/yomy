<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yomy — フィードを集めて、自分だけの朝刊に</title>
    <meta name="description" content="フィードを集めて、自分だけの朝刊に。Apple News に着想を得た iOS の RSS リーダー。">
    <meta property="og:title" content="yomy">
    <meta property="og:description" content="フィードを集めて、自分だけの朝刊に。Apple News に着想を得た iOS の RSS リーダー。">
    <meta property="og:image" content="https://shakshi3104.github.io/yomy/assets/yomy-og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="yomy">
    <meta name="twitter:description" content="フィードを集めて、自分だけの朝刊に。">
    <meta name="twitter:image" content="https://shakshi3104.github.io/yomy/assets/yomy-og-image.png">
    <link rel="icon" type="image/png" href="assets/icon.png">
    <style>
        :root {
            --bg: #F7F9FC;
            --text: #1A2740;
            --text-soft: #5A6478;
            --accent: #5B6EE8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Hero */
        .hero {
            padding: 120px 24px 16px;
            text-align: center;
        }

        .hero img.icon {
            width: 96px;
            height: 96px;
            border-radius: 22px;
            margin-bottom: 32px;
            box-shadow: 0 10px 24px rgba(91, 110, 232, 0.18);
        }

        .hero h1 {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }

        .hero p.tagline {
            font-size: 17px;
            color: var(--text-soft);
        }

        /* Main visual */
        .main-visual {
            padding: 0 24px;
            text-align: center;
        }

        .main-visual img {
            width: 100%;
            max-width: 880px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Features (minimal list) */
        .features {
            padding: 16px 24px 64px;
        }

        .features ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .features li {
            text-align: center;
        }

        .features li strong {
            display: block;
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .features li span {
            font-size: 15px;
            color: var(--text-soft);
        }

        /* Footer */
        footer {
            padding: 64px 24px 48px;
            text-align: center;
            color: var(--text-soft);
            font-size: 13px;
        }

        footer .links {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        footer a {
            color: var(--text-soft);
            text-decoration: none;
        }

        footer a:hover {
            color: var(--accent);
        }

        footer .copyright {
            font-size: 12px;
            opacity: 0.6;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .hero {
                padding: 80px 24px 32px;
            }
            .hero h1 {
                font-size: 32px;
            }
            .hero p.tagline {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

<header class="hero">
    <img class="icon" src="assets/icon.png" alt="yomy icon">
    <h1>yomy</h1>
    <p class="tagline">フィードを集めて、<br>自分だけの朝刊に。</p>
</header>

<section class="main-visual">
    <img src="assets/yomy-main-image.png" alt="yomy app screens">
</section>

<section class="features container">
    <ul>
        <li>
            <strong>お気に入りのフィードを一つに</strong>
            <span>RSS / Atom を登録して、Apple News のような体験で読む</span>
        </li>
        <li>
            <strong>ウィジェットで朝のひと目を</strong>
            <span>ホーム画面から最新の記事へ。タップで即座に開く</span>
        </li>
        <li>
            <strong>すべては端末の中で</strong>
            <span>外部送信なし。読んだ記事も保存した記事もあなたのもの</span>
        </li>
    </ul>
</section>

<footer>
    <div class="links">
        <a href="https://github.com/Shakshi3104/yomy">GitHub</a>
        <a href="privacy.html">Privacy</a>
        <a href="https://github.com/Shakshi3104/yomy/issues">Support</a>
    </div>
    <p class="copyright">© 2026 Shakshi3104</p>
</footer>

</body>
</html>
