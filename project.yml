name: Yomi
options:
  bundleIdPrefix: com.minsc
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  FeedKit:
    url: https://github.com/nmdias/FeedKit
    from: "9.1.2"

targets:
  Yomi:
    type: application
    platform: iOS
    sources:
      - path: Yomi
      - path: Shared
    resources:
      - path: Yomi/Assets.xcassets
    info:
      path: Yomi/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        BGTaskSchedulerPermittedIdentifiers:
          - com.minsc.yomi.refresh
        CFBundleDisplayName: yomy
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - yomi
            CFBundleURLName: com.minsc.Yomi
    entitlements:
      path: Yomi/Yomi.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.minsc.yomi
    dependencies:
      - package: FeedKit
      - sdk: WidgetKit.framework
      - target: YomiWidget
        embed: true
        codeSign: true
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"

  YomiWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: YomiWidget
      - path: Shared
    info:
      path: YomiWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: YomiWidget/YomiWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.minsc.yomi
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.minsc.Yomi.widget
